<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/js/bootstrap.bundle.min.js"></script>
    <title>info</title>
  </head>

  <body>
    <div id="app">
      <div class="container">
        <div class="row">
          <div class="col">
            <div id="main" style="width: 100%; height: 500px"></div>
          </div>
        </div>
        <div class="row">
          <div
            class="col"
            style="max-height: 500px; overflow-x: hidden; overflow-y: auto"
          >
            <table class="table table-striped table-hover">
              <thead>
                <tr>
                  <th scope="col" style="min-width: 60px">收支</th>
                  <th scope="col">商品</th>
                  <th scope="col">支付时间</th>
                  <th scope="col">交易方</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="trade in incomeList">
                  <th scope="row">{{trade.incomeExpenditure}}</th>
                  <td>{{trade.product}}</td>
                  <td>{{trade.payTime}}</td>
                  <td>{{trade.seller}}</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div
            class="col"
            style="max-height: 500px; overflow-x: hidden; overflow-y: auto"
          >
            <table class="table table-striped table-hover">
              <thead>
                <tr>
                  <th scope="col" style="min-width: 60px">收支</th>
                  <th scope="col">商品</th>
                  <th scope="col">支付时间</th>
                  <th scope="col">交易方</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="trade in expenditureList">
                  <th scope="row">{{trade.incomeExpenditure}}</th>
                  <td>{{trade.product}}</td>
                  <td>{{trade.payTime}}</td>
                  <td>{{trade.seller}}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="../plugins/vue3/vue.global.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="../plugins/echarts/echarts.js"></script>
  <script src="../dist/js/base.js"></script>
  <script>
    const HelloVueApp = {
      data() {
        return {
          message: "Hello Vue!!",
          incomeList: [],
          expenditureList: [],
          incomeExpenditure: [],
        };
      },
      mounted() {
        axios
          .get(application + "/trade/alipay-transaction-record/income")
          .then((response) => {
            this.incomeList = response.data;
          })
          .catch(function (error) {
            console.log(error);
          });
        axios
          .get(application + "/trade/alipay-transaction-record/expenditure")
          .then((response) => {
            this.expenditureList = response.data;
          })
          .catch(function (error) {
            console.log(error);
          });
        this.showIncomeExpenditure();
      },
      methods: {
        showIncomeExpenditure() {
          var chartDom = document.getElementById("main");
          var myChart = echarts.init(chartDom);
          myChart.showLoading();
          var option;
          axios
            .get(
              application +
                "/trade/alipay-transaction-record/incomeExpenditureByAllMonth"
            )
            .then((response) => {
              const expenditureList = response.data;
              option = {
                legend: {},
                tooltip: {},
                dimensions: [
                  "date",
                  { name: "income", displayName: "收入" },
                  { name: "expenditure", displayName: "支出" },
                ],
                dataset: {
                  source: expenditureList,
                },
                dataZoom: [
                  {
                    type: "inside",
                    start: 0,
                    end: 10,
                  },
                  {
                    start: 0,
                    end: 10,
                  },
                ],
                xAxis: { type: "category" },
                yAxis: {},
                series: [{ type: "bar" }, { type: "bar" }],
              };
              myChart.hideLoading();
              option && myChart.setOption(option);
            })
            .catch(function (error) {
              myChart.hideLoading();
              console.log(error);
            });
        },
      },
    };
    const app = Vue.createApp(HelloVueApp);
    const vm = app.mount("#app");
  </script>
</html>
